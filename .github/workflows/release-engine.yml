name: Release Engine

on:
  push:
    tags:
      - 'engine/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go mod tidy

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;28.0.13004108'

      - name: Determine NDK path
        run: |
          echo "NDK_PATH=$ANDROID_HOME/ndk/28.0.13004108" >> $GITHUB_ENV

      - name: Cross-compile gRPC server binaries
        run: |
          mkdir -p releases
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -o releases/ashwathd-arm64-v8a ./cmd/ashwathd
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o releases/ashwathd-linux-arm64 ./cmd/ashwathd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o releases/ashwathd-linux-x64 ./cmd/ashwathd
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o releases/ashwathd-macos-arm64 ./cmd/ashwathd
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o releases/ashwathd-macos-x64 ./cmd/ashwathd
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o releases/ashwathd-windows-x64.exe ./cmd/ashwathd

      - name: Build Android .so (libashwath_engine)
        run: |
          CC=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang \
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            go build -buildmode=c-shared \
            -o releases/libashwath_engine-arm64-v8a.so \
            ./cmd/libashwath/

      - name: Generate checksums
        run: cd releases && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: engine/releases/*

name: Build

on:
  push:
    branches: [main, feature/platform]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go vet
        run: go vet ./internal/...
        working-directory: engine

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go test
        run: go test ./internal/... -count=1 -timeout 120s
        working-directory: engine

  build:
    name: Build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
        exclude:
          - os: ubuntu-latest
            arch: arm64
          - os: macos-latest
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build ashwathd
        run: go build -o ashwathd ./cmd/ashwathd/
        working-directory: engine
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ashwathd-${{ matrix.os }}-${{ matrix.arch }}
          path: engine/ashwathd
